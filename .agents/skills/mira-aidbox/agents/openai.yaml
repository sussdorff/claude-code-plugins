interface:
  display_name: "Mira Aidbox"
  short_description: "Mira-specific Aidbox configuration, infrastructure, billing catalogs, flat tables, IG testing, and accumulated learnings. Supplements the samurai-skills plugin with mira-project-specific content. MUST USE whenever: (1) connecting to mira's Aidbox instance (URLs, auth, infrastructure), (2) working with mira's billing catalogs (EBM/GOA/HZV), (3) working with mira's flat tables or AidboxTriggers, (4) testing mira's FHIR IGs (fhir-praxis-de, fhir-dental-de), (5) working with mira's ETL pipelines or seed data, (6) querying mira's ViewDefinitions or $materialize setup. Also triggers on generic aidbox usage to supplement the upstream samurai-skills plugin with mira-specific context."
  default_prompt: "Use the mira-aidbox skill to help with this task. Mira-specific Aidbox configuration, infrastructure, billing catalogs, flat tables, IG testing, and accumulated learnings. Supplements the samurai-skills plugin with mira-project-specific content. MUST USE whenever: (1) connecting to mira's Aidbox instance (URLs, auth, infrastructure), (2) working with mira's billing catalogs (EBM/GOA/HZV), (3) working with mira's flat tables or AidboxTriggers, (4) testing mira's FHIR IGs (fhir-praxis-de, fhir-dental-de), (5) working with mira's ETL pipelines or seed data, (6) querying mira's ViewDefinitions or $materialize setup. Also triggers on generic aidbox usage to supplement the upstream samurai-skills plugin with mira-specific context."
