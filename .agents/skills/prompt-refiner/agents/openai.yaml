interface:
  display_name: "Prompt Refiner"
  short_description: "Refine raw, unstructured, or dictated user input into a structured prompt via HeyPresto MCP, then EXECUTE the refined prompt immediately. Use when the user provides messy dictated text, vague task descriptions, or says \"expand prompt\", \"refine prompt\", \"use heypresto\", \"prompt verbessern\". Also triggers on \"Expand Prompt.\" at the start of a message followed by stream-of-consciousness text. Do NOT use for simple direct questions or already-clear prompts."
  default_prompt: "Use the prompt-refiner skill to help with this task. Refine raw, unstructured, or dictated user input into a structured prompt via HeyPresto MCP, then EXECUTE the refined prompt immediately. Use when the user provides messy dictated text, vague task descriptions, or says \"expand prompt\", \"refine prompt\", \"use heypresto\", \"prompt verbessern\". Also triggers on \"Expand Prompt.\" at the start of a message followed by stream-of-consciousness text. Do NOT use for simple direct questions or already-clear prompts."
