interface:
  display_name: "Wave Orchestrator"
  short_description: "Orchestrate parallel implementation of multiple beads across cmux panes in dependency-aware waves. Use when implementing a whole feature area, dispatching multiple beads at once, or running parallel cld -b sessions. MUST USE when user says \"wave\", \"parallel beads\", \"implement all beads for X\", \"start the beads\", or references implementing more than 2 beads at once. Also triggers on \"cmux dispatch\", \"multi-bead\", \"wave orchestrator\"."
  default_prompt: "Use the wave-orchestrator skill to help with this task. Orchestrate parallel implementation of multiple beads across cmux panes in dependency-aware waves. Use when implementing a whole feature area, dispatching multiple beads at once, or running parallel cld -b sessions. MUST USE when user says \"wave\", \"parallel beads\", \"implement all beads for X\", \"start the beads\", or references implementing more than 2 beads at once. Also triggers on \"cmux dispatch\", \"multi-bead\", \"wave orchestrator\"."
