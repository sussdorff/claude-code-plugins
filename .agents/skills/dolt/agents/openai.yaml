interface:
  display_name: "Dolt"
  short_description: "Troubleshoot beads Dolt failures: `bd dolt` push/pull errors, merge conflicts, embedded/shared-server mode problems, remote auth issues, local DB recovery, re-clone, reflog restore, and broken .beads Dolt config. Use whenever beads sync or Dolt infrastructure is failing, including symptoms like \"beads do not sync\", \"cannot push issues\", \"no common ancestor\", \"not supported in embedded mode\", or \"lost local database\". Read the beads changelog first. Do not use for normal beads tracking (`bd create/ready/close`), standalone Dolt databases, or regular git push/pull."
  default_prompt: "Use the dolt skill to help with this task. Troubleshoot beads Dolt failures: `bd dolt` push/pull errors, merge conflicts, embedded/shared-server mode problems, remote auth issues, local DB recovery, re-clone, reflog restore, and broken .beads Dolt config. Use whenever beads sync or Dolt infrastructure is failing, including symptoms like \"beads do not sync\", \"cannot push issues\", \"no common ancestor\", \"not supported in embedded mode\", or \"lost local database\". Read the beads changelog first. Do not use for normal beads tracking (`bd create/ready/close`), standalone Dolt databases, or regular git push/pull."
