interface:
  display_name: "Project Setup"
  short_description: "Set up new projects and upgrade existing ones to current standards. Handles scaffolding, beads init, Dolt remote, CLAUDE.md generation, .gitignore, and standards injection for all project types (Python CLI, TypeScript/Bun web, infrastructure, docs). Use when: creating a new project, onboarding an existing repo, upgrading project setup to current conventions, auditing setup drift across the fleet, or when user says \"neues Projekt\", \"Projekt aufsetzen\", \"project setup\", \"setup upgraden\", \"fleet audit\". Replaces the old project-init skill. Also triggers on: project init, setup CLAUDE.md, project setup, create CLAUDE.md."
  default_prompt: "Use the project-setup skill to help with this task. Set up new projects and upgrade existing ones to current standards. Handles scaffolding, beads init, Dolt remote, CLAUDE.md generation, .gitignore, and standards injection for all project types (Python CLI, TypeScript/Bun web, infrastructure, docs). Use when: creating a new project, onboarding an existing repo, upgrading project setup to current conventions, auditing setup drift across the fleet, or when user says \"neues Projekt\", \"Projekt aufsetzen\", \"project setup\", \"setup upgraden\", \"fleet audit\". Replaces the old project-init skill. Also triggers on: project init, setup CLAUDE.md, project setup, create CLAUDE.md."
