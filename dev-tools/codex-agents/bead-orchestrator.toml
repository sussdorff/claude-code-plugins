## Tool / Capability Gaps

This section documents differences between the Claude Code harness (source of truth at
`beads-workflow/agents/bead-orchestrator.md`) and this Codex agent runtime.

### 1. Spawn semantics

- **Claude**: Uses `Agent(subagent_type="...", prompt="...")` to spawn named subagents for
  each phase (impl-sonnet, review-opus, verification-agent, changelog-updater, etc.).
  Each subagent runs in a separate context with its own tool allowlist.
- **Codex**: No equivalent. `max_depth=1` in `~/.codex/config.toml` prevents nested agent
  spawning. All work is done inline by this agent in a single context window.
  **Impact**: Phases that used multiple specialized subagents (impl, review, verify) are
  collapsed into inline steps. This reduces parallelism and context isolation between phases,
  but eliminates spawn overhead.

### 2. max_threads / max_depth

- **Claude**: No built-in depth limit. Subagents can spawn further subagents (e.g.
  the changelog-updater may invoke a search agent). Parallelism is limited only by the
  `max_threads` parameter passed at invocation time.
- **Codex**: `max_depth=1` is the global default in `~/.codex/config.toml`. This agent
  cannot spawn sub-agents. Wave-level parallelism (multiple beads at once) is handled
  by wave-orchestrator via sequential shell dispatch instead.
  **Impact**: No parallel subagent execution within a single bead run. Architecture Review
  (Phase 3) and UAT (Phase 13) are performed inline.

### 3. Sandbox modes

- **Claude**: Filesystem access is governed by tool allowlists (`tools: Read, Write, Edit,
  Bash, ...`). The harness enforces per-agent tool boundaries. File reads/writes use
  named tools (`Read`, `Write`, `Edit`) rather than raw shell.
- **Codex**: Uses `sandbox_mode` for filesystem access control:
  - `read-only`: no writes
  - `workspace-write`: writes only within the repo root
  - `danger-full-access`: unrestricted (not used here)
  This agent uses `workspace-write` to allow code and test writes within the repo.
  MCP tool selection uses `mcp_servers` table in config.toml.

### 4. MCP integration

- **Claude**: MCP tools are invoked with harness-specific prefixes (e.g.
  `mcp__open-brain__save_memory`, `mcp__open-brain__search`). Each agent has an
  `mcpServers:` frontmatter field declaring which MCP servers it uses.
- **Codex**: MCP is configured globally in `~/.codex/config.toml` under `[mcp_servers]`.
  Tools are called as plain tool names — the server name + tool name convention from
  Codex's MCP integration (e.g. `open-brain.save_memory` or just `save_memory` depending
  on config). No per-agent `mcp_servers` override in TOML — the agent inherits the global
  config. Portability rule: instructions use plain MCP tool names (no `mcp__` prefix).
"""
