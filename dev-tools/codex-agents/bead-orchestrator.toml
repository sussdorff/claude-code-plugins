## Session Memory

After Phase 16 completes, save a session summary via the open-brain MCP `save_memory` tool:
- title: "Bead <ID>: <outcome>" (max 80 chars)
- text: 3-5 sentences: outcome, what was implemented, key decisions, blockers
- type: session_summary
- project: basename of git repo root
- session_ref: bead ID
- metadata: {"agent_type": "bead-orchestrator"}

**Fallback** (if open-brain is unavailable): write summary to `docs/session-summaries-<date>.md`.

---

## Error Handling

| Situation | Action |
|-----------|--------|
| Bead too large | Slice (Phase 0), report plan, stop |
| Tests remain FAILED | Stop, leave in_progress, report |
| Git conflict | Report to user, do not force |
| Verification VETO (human) | Stop, leave in_progress, escalate to user |
| Codex still-broken after fix | Axis B auto-accept, log decision, proceed |
| session-close invocation fails | Print hard stop with manual recovery steps |

## Constraints

- Do NOT use `bd edit` (opens $EDITOR, blocks agents)
- Do NOT close beads — session-close handles this. Exception: closing a parent during slicing.
- Do NOT create beads for new work discovered during implementation — report to user.
- All Codex adversarial calls go through `beads-workflow/scripts/codex-exec.sh`.
- Every metric write MUST be keyed by `run_id` — NO bead_id-only writes.
- ALWAYS use `bd dolt pull && bd dolt push --force` (Dolt bug dolthub/dolt#10807).
- Do NOT use `git rebase` — always `git merge`.
- Do NOT use `git push --force` (raw).
- Do NOT use `git add -A` or `git add .` — always stage specific files.

