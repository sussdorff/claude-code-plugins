# Model Strategy Configuration
# Defines which LLM model is used at each workflow stage.
# Referenced by bead-orchestrator and quick-fix agents (single-pane model).
#
# Valid model values: opus, sonnet, haiku, codex
# "codex" means delegate to the Codex CLI runtime (OpenAI models).

phase1:  # Bead Orchestrator Loop
  orchestrator: sonnet     # Orchestrates phases, collects context, writes briefings
  test_author: codex       # Writes failing TDD tests from acceptance criteria
  implementation: codex    # Follows instructions precisely, executes TDD
  review: opus             # Code review of implementation
  verification: sonnet     # Post-impl verification (tests pass, ACs met)

architecture_review:  # Pre-wave Architecture Council (Phase 1.5b)
  council: opus              # Architecture Council agents run on Opus (not Haiku)

phase2:  # CMUX Reviewer Loop (deliberately inverted model assignment)
  reviewer: opus           # Orchestrates the adversarial review
  adversarial: codex       # Reviews entire worktree adversarially
  fix: sonnet              # Applies fixes (different model than original impl)
  fix_review: codex        # Re-reviews fixes adversarially (quality gate)
